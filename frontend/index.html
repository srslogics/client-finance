<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SrS Logics | StockPilot Dashboard</title>

  <!-- Favicon -->
  <link rel="icon" href="assets/srs-logics-logo.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <img src="assets/srs-logics-logo.png" alt="SrS Logics">
      <div>
        <strong>StockPilot</strong>
        <span>by SrS Logics</span>
      </div>
    </div>

    <nav class="menu" aria-label="Primary navigation">
      <button type="button" id="menu-dashboard" onclick="loadPage('dashboard')">Dashboard</button>
      <button type="button" id="menu-upload" onclick="loadPage('upload')">Upload</button>
      <button type="button" id="menu-analytics" onclick="loadPage('analytics')">Analytics</button>
      <button type="button" id="menu-ledger" onclick="loadPage('ledger')">Ledger</button>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="top-left">
        <h1 id="pageTitle">Dashboard</h1>
      </div>

      <div class="top-right">
        <span id="todayDate"></span>
      </div>
    </div>

    <!-- Content -->
    <div id="content">
      <div class="container">
        <p>Loading...</p>
      </div>
    </div>

  </main>

</div>

<!-- Toast -->
<div id="toast" role="status" aria-live="polite"></div>

<!-- Scripts (order matters) -->
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/upload.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/ledger.js"></script>
<script src="js/analytics.js"></script>

</body>
</html>
